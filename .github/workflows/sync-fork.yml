name: Auto Sync Fork

on:
  schedule:
    - cron: '0 3 * * *'   # runs daily at 03:00 UTC (11:00 Beijing time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync likeaboy80/dailystock888 --source ZhuLinsen/daily_stock_analysis --branch main
